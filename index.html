<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Elli</title>
    <link rel="manifest" href="manifest.json">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#1a1a2e;color:#e0e0e0;
            font-family:-apple-system,"Microsoft YaHei",sans-serif;
            height:100vh;height:100dvh;
            display:flex;flex-direction:column;
            overflow:hidden;
        }
        #top-bar{
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            padding:15px 15px 5px;
            flex-shrink:0;
            background:#1a1a2e;
        }
        .avatar-container{position:relative;display:flex;align-items:flex-start;justify-content:center}
        #avatar{width:100px;height:100px;border-radius:20px;object-fit:cover;cursor:pointer}
        #weather-emoji{font-size:1.3rem;margin-left:-8px;margin-top:3px;background:#1a1a2e;border-radius:50%;padding:2px;z-index:2}
        h1{font-size:1.1rem;font-weight:bold;margin:6px 0 2px;color:#e0e0e0}
        #status{font-size:.75rem;color:#888;min-height:18px}
        #memory-status{font-size:.7rem;color:#666;min-height:16px}

        #reply-box{
            flex:1;overflow-y:auto;
            background:#0d0d1a;border-radius:16px;
            padding:12px;margin:8px 15px;
            font-size:.95rem;line-height:1.5;
            white-space:pre-wrap;word-break:break-word;
        }
        #bottom-bar{
            display:flex;gap:8px;
            padding:8px 15px 20px;
            flex-shrink:0;
            background:#1a1a2e;
        }
        #text-input{
            flex:1;padding:12px;border-radius:25px;
            border:none;background:#0d0d1a;
            color:#e0e0e0;font-size:1rem;outline:none;
        }
        #mic-btn{
            width:48px;height:48px;border-radius:50%;
            border:none;background:#00cc00;color:#fff;
            font-size:1.3rem;cursor:pointer;flex-shrink:0;
            transition:background .2s;
        }
        #mic-btn.listening{background:#006600}
        #mic-btn:active{transform:scale(.95)}

        @keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-5px)}100%{transform:translateX(0)}}
        .avatar-shake{animation:shake .3s ease-in-out}
    </style>
</head>
<body>
    <div id="top-bar">
        <div class="avatar-container">
            <img id="avatar" src="elli_avatar.png" alt="Elli">
            <span id="weather-emoji"></span>
        </div>
        <h1>Elli</h1>
        <div id="status">在听你说话</div>
        <div id="memory-status">✨ 初次见面</div>
    </div>
    <div id="reply-box"></div>
    <div id="bottom-bar">
        <input type="text" id="text-input" placeholder="说点什么...">
        <button id="mic-btn" title="语音输入">🎤</button>
    </div>
    <script>
        const SERVER_URL = "https://elli-7mth.onrender.com/chat";
        const avatar = document.getElementById("avatar");
        const statusDiv = document.getElementById("status");
        const memStatus = document.getElementById("memory-status");
        const replyBox = document.getElementById("reply-box");
        const textInput = document.getElementById("text-input");
        const micBtn = document.getElementById("mic-btn");

        const avatarStates = {
            idle: "elli_avatar.png",
            think: "elli_think.apng",
            talk: "elli_talk.apng"
        };
        const idleVariants = ["elli_selfie.apng"];
        let avatarState = "idle";
        let idleTimer = null;

        function setAvatarState(state) {
            if (avatarStates[state]) {
                avatar.src = avatarStates[state] + "?" + Date.now();
                avatarState = state;
            }
        }

        function randomIdleVariant() {
            if (avatarState === "idle" && Math.random() < 0.3) {
                avatar.src = idleVariants[0] + "?" + Date.now();
                setTimeout(() => { if (avatarState === "idle") setAvatarState("idle"); }, 5000);
            }
            idleTimer = setTimeout(randomIdleVariant, 30000);
        }
        idleTimer = setTimeout(randomIdleVariant, 30000);

        async function loadWeather() {
            try {
                const loc = await fetch("https://get.geojs.io/v1/ip/geo.json").then(r => r.json());
                const weatherResp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current_weather=true`).then(r => r.json());
                const emojiMap = {0:"☀️",1:"⛅",2:"⛅",3:"⛅",45:"🌫️",48:"🌫️",51:"🌧️",53:"🌧️",55:"🌧️",61:"🌧️",63:"🌧️",65:"🌧️",71:"❄️",73:"❄️",75:"❄️",80:"🌧️",81:"🌧️",82:"🌧️",95:"⚡",96:"⚡",99:"⚡"};
                const code = weatherResp.current_weather.weathercode;
                document.getElementById("weather-emoji").textContent = emojiMap[code] || "🌈";
            } catch(e) {}
        }
        loadWeather();

        function setTalking(t) {
            if (t) {
                setAvatarState("talk");
                if (navigator.vibrate) navigator.vibrate(50);
            } else {
                setAvatarState("idle");
            }
        }

        function speakText(text) {
            const hasChinese = /[\u4e00-\u9fff]/.test(text);
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = hasChinese ? "zh-CN" : "de-DE";
                utter.rate = 1.0;
                utter.onstart = () => {
                    setTalking(true);
                    statusDiv.textContent = "Elli 在说话...";
                };
                utter.onend = () => {
                    setTalking(false);
                    statusDiv.textContent = "在听你说话";
                };
                utter.onerror = () => {
                    setTalking(false);
                    statusDiv.textContent = "在听你说话";
                };
                window.speechSynthesis.speak(utter);
            }
        }

        async function getReply(userText) {
            const resp = await fetch(SERVER_URL, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:userText})});
            const data = await resp.json();
            return data.reply;
        }

        async function processInput(text) {
            if (!text.trim()) return;
            statusDiv.textContent = "Elli 在想...";
            setAvatarState("think");
            replyBox.textContent = "";
            try {
                const reply = await getReply(text);
                replyBox.textContent = reply;
                memStatus.textContent = "💾 已记住";
                speakText(reply);
            } catch(e) {
                replyBox.textContent = "哎呀，网络好像不太稳定，稍后再试嘛～";
                setTalking(false);
                statusDiv.textContent = "在听你说话";
            }
        }

        let listening = false;
        micBtn.addEventListener("click", () => {
            if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) return;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recog = new SpeechRecognition();
            recog.lang = "de-DE"; recog.interimResults = false; recog.maxAlternatives = 1;
            if (listening) return;
            listening = true;
            micBtn.classList.add("listening");
            micBtn.textContent = "⏺";
            statusDiv.textContent = "在听...";
            recog.start();
            recog.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                textInput.value = transcript;
                processInput(transcript);
            };
            recog.onerror = () => { statusDiv.textContent = "没听清，再试试？"; };
            recog.onend = () => {
                listening = false;
                micBtn.classList.remove("listening");
                micBtn.textContent = "🎤";
            };
        });

        textInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const text = textInput.value;
                textInput.value = "";
                processInput(text);
            }
        });

        let pressTimer;
        avatar.addEventListener("touchstart", () => {
            pressTimer = setTimeout(() => {
                avatar.classList.add("avatar-shake");
                setTimeout(() => avatar.classList.remove("avatar-shake"), 300);
            }, 500);
        });
        avatar.addEventListener("touchend", () => clearTimeout(pressTimer));
        avatar.addEventListener("touchmove", () => clearTimeout(pressTimer));
        avatar.addEventListener("dblclick", () => {
            avatar.classList.add("avatar-shake");
            setTimeout(() => avatar.classList.remove("avatar-shake"), 300);
        });
    </script>
</body>
</html>
